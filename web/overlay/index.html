<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Win Lose Overlay</title>
  <link rel="stylesheet" href="/static/overlay/style.css" />
</head>
<body>
  <div class="overlay-wrap">
  <div class="score-board">
    <span class="score-label">W</span>
    <span class="score-value" id="wins">0</span>

    <span class="score-separator">—</span>

    <span class="score-value" id="losses">0</span>
    <span class="score-label">L</span>
  </div>

  <div class="rate-wrap">
    <div class="rate-value" id="winrate">0%</div>
  </div>
</div>

  <script src="/static/overlay/app.js"></script>
</body>
</html>
